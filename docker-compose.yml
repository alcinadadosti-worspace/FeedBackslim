version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: ouvidoria-backend
    restart: unless-stopped
    environment:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      PORT: 3001
      BACKEND_URL: ${BACKEND_URL:-http://localhost:3001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_RH_CHANNEL: ${SLACK_RH_CHANNEL:-rh-notifications}
    ports:
      - "3001:3001"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - ouvidoria-network

  # Frontend Web App
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    container_name: ouvidoria-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    ports:
      - "3000:3000"
    networks:
      - ouvidoria-network

  # Slack Bot (optional)
  slack-bot:
    build:
      context: ./app/slack-bot
      dockerfile: Dockerfile
    container_name: ouvidoria-slack-bot
    restart: unless-stopped
    profiles:
      - slack
    depends_on:
      - backend
    environment:
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SLACK_RH_CHANNEL: ${SLACK_RH_CHANNEL:-rh-notifications}
      PORT: 3002
    ports:
      - "3002:3002"
    networks:
      - ouvidoria-network

volumes:
  backend_uploads:

networks:
  ouvidoria-network:
    driver: bridge
